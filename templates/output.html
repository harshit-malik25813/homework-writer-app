<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Homework Output</title>
        <style>
            :root {
                --bg: #f6f1e8;
                --card: #fffaf2;
                --ink: #1f2937;
                --muted: #6b7280;
                --accent: #2f6f5e;
                --border: #d7cdbd;
                --shadow: 0 18px 50px rgba(31, 41, 55, 0.12);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Georgia, "Times New Roman", serif;
                background:
                    radial-gradient(circle at top left, rgba(47, 111, 94, 0.14), transparent 28%),
                    radial-gradient(circle at top right, rgba(210, 168, 92, 0.14), transparent 24%),
                    var(--bg);
                color: var(--ink);
            }

            .page {
                max-width: 960px;
                margin: 0 auto;
                padding: 40px 20px 56px;
            }

            .card {
                background: rgba(255, 250, 242, 0.94);
                border: 1px solid rgba(215, 205, 189, 0.85);
                border-radius: 22px;
                box-shadow: var(--shadow);
                overflow: hidden;
            }

            .header {
                padding: 24px 24px 0;
            }

            .eyebrow {
                margin: 0 0 8px;
                text-transform: uppercase;
                letter-spacing: 0.18em;
                font-size: 0.78rem;
                color: var(--accent);
                font-family: "Segoe UI", Arial, sans-serif;
                font-weight: 700;
            }

            h1 {
                margin: 0;
                font-size: clamp(2rem, 5vw, 3.2rem);
                line-height: 1.05;
            }

            .subtext {
                margin: 10px 0 0;
                color: var(--muted);
                font-family: "Segoe UI", Arial, sans-serif;
            }

            .body {
                padding: 24px;
            }

            pre {
                margin: 0;
                padding: 18px 20px;
                border-radius: 18px;
                border: 1px solid var(--border);
                background: #fff;
                color: #111827;
                overflow-x: auto;
                white-space: pre-wrap;
                word-break: break-word;
                font-family: Consolas, "Liberation Mono", Menlo, Monaco, monospace;
                line-height: 1.6;
            }

            .empty {
                color: var(--muted);
                font-style: italic;
            }

            .actions {
                margin-top: 18px;
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            }

            a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 12px 18px;
                border-radius: 999px;
                background: var(--accent);
                color: #fff;
                text-decoration: none;
                font-family: "Segoe UI", Arial, sans-serif;
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <main class="page">
            <section class="card">
                <div class="header">
                    <p class="eyebrow">Generated Output</p>
                    <h1>Formatted homework text</h1>
                    <p class="subtext">This is the string assembled by the helper functions and stored after submitting <code>/generate</code>.</p>
                </div>
                <div class="body">
                    <!-- Show the saved homework text inside a code block so it looks like a neat copyable note. -->
                    {% if generated_homework %}
                        <pre><code>{{ generated_homework }}</code></pre>
                    {% else %}
                        <pre><code class="empty">No homework has been generated yet.</code></pre>
                    {% endif %}
                    <!-- This button takes the user back to the form to make a new homework sheet. -->
                    <div class="actions">
                        <a href="{{ url_for('index') }}">Back to form</a>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
